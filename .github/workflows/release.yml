name: Create Release

on:
  push:
    branches:
      - master
    paths-ignore:
      - '.github/**'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version
        id: version
        run: |
          LATEST=$(git tag --sort=-v:refname | head -n1)
          if [ -z "$LATEST" ]; then
            NEXT="1.0.1"
            PREV=""
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"
            NEXT="$MAJOR.$MINOR.$((PATCH + 1))"
            PREV="$LATEST"
          fi
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"
          echo "prev_tag=$PREV" >> "$GITHUB_OUTPUT"

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const newTag = "${{ steps.version.outputs.tag }}";
            const prevTag = "${{ steps.version.outputs.prev_tag }}";
            const headSha = context.sha;

            let body = 'See commit history for changes.';
            if (prevTag) {
              const { data: comparison } = await github.rest.repos.compareCommitsWithBasehead({
                owner: context.repo.owner,
                repo: context.repo.repo,
                basehead: `${prevTag}...${headSha}`,
              }).catch(() => ({ data: { commits: [] } }));

              if (comparison.commits.length > 0) {
                body = comparison.commits
                  .map(c => `* ${c.commit.message.split('\n')[0]}`)
                  .join('\n');
              }
            }

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: newTag,
              name: newTag,
              body: `### Changes\n${body}`,
              draft: false,
              prerelease: false,
            });
